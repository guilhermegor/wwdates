site_name: wwdates
site_description: Global calendar system. Python package.
repo_url: https://github.com/guilhermegor/wwdates
nav:
  - Home: index.md
  - Usage: usage.md
  - Examples: examples.md
  - API Reference: api.md
  - FAQ: faq.md
  - Contributing: contributing.md
  - Changelog: changelog.md
theme:
  name: material
  # overrides/main.html exposes the code version (from mkdocs_hooks.py) as a meta tag.
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/white-balance-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  # Include files from the repo root (e.g. CHANGELOG.md) into a docs page, single-sourced.
  - pymdownx.snippets:
      base_path:
        - .

# Build hook: reads the version from pyproject.toml into config.extra.code_version,
# which overrides/main.html surfaces and javascripts/header-version.js renders.
hooks:
  - mkdocs_hooks.py
extra_javascript:
  - javascripts/header-version.js
extra_css:
  - stylesheets/version-badge.css

# Non-published docs: MkDocs builds every .md under docs/, so working
# documents must be excluded here or they ship to readers.
exclude_docs: |
  # NOTE: .gitignore syntax — comments must be on their own line. A trailing
  # "# ..." after a pattern becomes part of the pattern and silently disables it.
  # work-to-do backlogs / follow-up notes
  backlog/
  # design specs / working notes, not published
  superpowers/
  # docs/ authoring guidance, not a published page
  CLAUDE.md
  # offline merge-checkpoint log, internal
  checkpoints.md
  # git-ignored scaffolding-lessons record, never published
  blueprintx-lessons.md

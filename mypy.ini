# mypy configuration — standalone per-tool config (like ruff.toml / .codespellrc),
# not a pyproject [tool.mypy] block. See CLAUDE.md "Tooling".
#
# IMPORTANT: mypy is invoked with `src/` as the working directory
# (`cd src && mypy --config-file ../mypy.ini .` — see the Makefile/tasks.sh/pre-commit
# `mypy` entries). This makes `src` the single package base, so the app's bare imports
# (`config.x`, `utils.x`, `model.x`, …) resolve exactly as they do at runtime
# (`pythonpath = . src` in pytest.ini). Running mypy from the repo root with both
# `mypy_path = src` and `files = src` makes the repo root AND `src` competing bases, so
# a file resolves twice ("Source file found twice under different module names") on the
# deeper DDD tree — running from `src` avoids that.
[mypy]
explicit_package_bases = True
namespace_packages = True
python_version = 3.12

# Many data/vendor libs ship no type stubs (pandas, openpyxl, stpstone, DB drivers);
# don't fail on their missing types.
ignore_missing_imports = True

# Pragmatic baseline (not --strict): enforce annotations and obvious type errors
# without drowning in the runtime-TypeChecker metaclass machinery. Tighten later.
check_untyped_defs = True
warn_unused_ignores = True
warn_redundant_casts = True

# Excluded (paths are relative to src/, the invocation cwd), mirroring ruff.toml:
#   - the runtime type-checking engine (utils/typing or chassis/typing) is intrinsic
#     metaprogramming mypy cannot analyse — the same reason it is ANN401-exempt;
#   - the example chassis handlers / example_feature are reference scaffolding, not
#     production code, and carry deliberate loose typing.
exclude = (?x)(^chassis/|^capabilities/example_feature/|^utils/typing/|_internal/utils/typing/)

# Belt-and-braces for the typing engine in both layouts (MVC utils/typing, DDD
# chassis/typing), in case a project removes the path exclude above.
[mypy-utils.typing.*]
ignore_errors = True

[mypy-chassis.typing.*]
ignore_errors = True

# lib-minimal nests the same engine at <pkg>._internal.utils.typing.
[mypy-*._internal.utils.typing.*]
ignore_errors = True
